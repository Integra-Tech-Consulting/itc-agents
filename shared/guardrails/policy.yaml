# ITC agents — central policy
# Loaded by shared/tools/policy.py at runtime via env + this YAML.

version: 1

global:
  # Master kill-switch; setting ITC_AGENTS_DISABLED=true in env overrides this.
  enabled: true
  default_daily_budget_usd: 5.0
  default_require_human_approval: true
  pii_retention_days_max: 90

forbidden_tools_global:
  - shell_exec_unsandboxed
  - filesystem_write_outside_repo
  - network_unrestricted

human_approval_required_for:
  - gmail_send
  - stripe_create_invoice
  - stripe_send_reminder
  - linear_create_project
  - github_create_pr
  - apply_patch
  - paid_spend

stripe:
  modes_allowed: [test, live]
  live_amount_human_approval_threshold_cents: 1000000   # €10,000

deploy_gates:
  qa_sec_critical_blocks_deploy: true
  pending_human_approvals_block_deploy: true

audits:
  governance_daily_audit_required: true
  eval_pass_rate_threshold_default: 0.85
